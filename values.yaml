#SG see default configs in github 
#V39.0 for Helm 3.6 https://github.com/traefik/traefik-helm-chart/blob/v39.0/traefik/values.yaml	
#latest https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml

logs:
  general:
    level: DEBUG
  access:
    enabled: true
    format: json
    fields:
      general:
        # full field list
        # https://doc.traefik.io/traefik/reference/install-configuration/observability/logs-and-accesslogs/#json-format-fields
        defaultmode: keep
        names:
          RouterName: keep
          ServiceName: keep
      headers:
        # -- [Limit logged fields or headers](https://doc.traefik.io/traefik/observability/access-logs/#limiting-the-fieldsincluding-headers)
        defaultmode: keep


# on some bare-metal installations, we need special privileges to run traefik on port 80. If traefik reports an error try
# uncommenting the following lines.

deployment:
  podSecurityContext:
    runAsNonRoot: false
#
securityContext:
  runAsNonRoot: false
  runAsUser: 0
  capabilities:
    drop: []

#end security
ports:
  web:
    port: 80
  websecure:
    port: 443
    exposedPort: 443
  traefik:
    port: 8080
    expose: true
    exposedPort: 8080
    protocol: TCP


# we enable gateway-api features
providers:
  kubernetesGateway:
    enabled: true
    experimentalChannel: true
  kubernetesCRD:
    # -- Load Kubernetes IngressRoute provider
    enabled: true

# we disable gateway-api defaults because we want to provide our own
gatewayClass:
  enabled: false

# we disable gateway-api defaults because we want to provide our own
gateway:
  enabled: false

#SG ENABLE Dashboard API
api:  # @schema additionalProperties: false
  # -- Enable the dashboard
  dashboard: true
  # -- Custom name for the dashboard (v3.7+).
  #dashboardName: "Traefik Dashboard"  # @schema type:[string, null] 
  # -- Disable the advertisement from the dashboard.
  disableDashboardAd: true # @schema type:[boolean, null]
  # -- Enable the insecure API (HTTP)
  insecure: true # @schema type:[boolean, null]
  # -- Enable the debug API
  debug:  true # @schema type:[boolean, null]
  # -- Configure API basePath
  #basePath: "/dashboard/"  # @schema type:[string, null]; default: "/"

  #SG ENABLE Dashboard Routes
    # -- Only dashboard & healthcheck IngressRoute are supported.
  # It's recommended to create workloads CR outside of this Chart.
  # @default -- See _values.yaml_
ingressRoute:
  dashboard:
  # -- Create an IngressRoute for the dashboard
    enabled: true
    # -- Additional ingressRoute annotations (e.g. for kubernetes.io/ingress.class)
    #SG: eanadev.org host? 
    #annotations: {}
    # -- Additional ingressRoute labels (e.g. for filtering IngressRoute by custom labels)
    #labels: {}
    # -- The router match rule used for the dashboard ingressRoute
    matchRule: PathPrefix(`/dashboard`) || PathPrefix(`/api`)
    # -- The internal service used for the dashboard ingressRoute
    # @default -- api@internal
    services:
      - name: api@internal
        kind: TraefikService
      # -- Specify the allowed entrypoints to use for the dashboard ingress route, (e.g. traefik, web, websecure).
      # By default, it's using traefik entrypoint, which is not exposed.
      # /!\ Do not expose your dashboard without any protection over the internet /!\
    entryPoints: ["traefik"]
    #entryPoints: ["traefik","web","websecure"]
    # -- Additional ingressRoute middlewares (e.g. for authentication)
    #middlewares: []
      # -- TLS options (e.g. secret containing certificate)
    #tls: {}
  healthcheck:
    # -- Create an IngressRoute for the healthcheck probe
    enabled: true
    # -- Additional ingressRoute annotations (e.g. for kubernetes.io/ingress.class)
    #annotations: {}
    # -- Additional ingressRoute labels (e.g. for filtering IngressRoute by custom labels)
    #labels: {}
    # -- The router match rule used for the healthcheck ingressRoute
    matchRule: PathPrefix(`/ping`)
    # -- The internal service used for the healthcheck ingressRoute
    # @default -- ping@internal
    services:
      - name: ping@internal
        kind: TraefikService
      # -- Specify the allowed entrypoints to use for the healthcheck ingress route, (e.g. traefik, web, websecure).
      # By default, it's using traefik entrypoint, which is not exposed.
    entryPoints: ["traefik"]
    #entryPoints: ["web"]
    #entryPoints: ["traefik","web","websecure"]
    # -- Additional ingressRoute middlewares (e.g. for authentication)
    #middlewares: []
    # -- TLS options (e.g. secret containing certificate)
    #  tls: {}

## Tracing
# -- https://doc.traefik.io/traefik/observability/tracing/overview/
tracing:  # @schema additionalProperties: false
  # -- Enables tracing for internal resources. Default: false.
  addInternals: false
  # -- Defines additional resource attributes to be sent to the collector.
  resourceAttributes: {}
  # -- Defines the list of request headers to add as attributes. It applies to client and server kind spans.
  capturedRequestHeaders: []
  # -- Defines the list of response headers to add as attributes. It applies to client and server kind spans.
  capturedResponseHeaders: []
